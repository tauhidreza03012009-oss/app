<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>3D Mega Arena - Multi-Room Prediction Edition</title>
<link rel="manifest" href="./manifest.json">
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-user-select:none;}
html,body{width:100%;height:100%;overflow:hidden;background:#f0f4f8;}
canvas{display:block;width:100%!important;height:100%!important;touch-action:none;}
#jst{
  position:fixed;bottom:30px;left:30px;width:130px;height:130px;
  border-radius:50%;z-index:99;
  background:rgba(0,0,0,0.05);
  border:2px solid rgba(0,0,0,0.2);
  box-shadow:0 0 15px rgba(0,0,0,0.1);
  touch-action:none;
}
#jsk{
  position:absolute;top:50%;left:50%;width:50px;height:50px;
  border-radius:50%;transform:translate(-50%,-50%);
  background:radial-gradient(circle at 35% 35%,#ffdd67,#ffaa00);
  box-shadow:0 0 10px rgba(0,0,0,0.2);pointer-events:none;
}
#jmp{
  position:fixed;bottom:30px;right:30px;width:80px;height:80px;
  border-radius:50%;z-index:99;
  background:rgba(0,0,0,0.05);
  border:2px solid rgba(0,0,0,0.2);
  box-shadow:0 0 15px rgba(0,0,0,0.1);
  display:flex;align-items:center;justify-content:center;
  font-family:monospace;color:#333;font-size:11px;letter-spacing:2px;
  touch-action:none;
}
#run{
  position:fixed;bottom:125px;right:30px;width:80px;height:80px;
  border-radius:50%;z-index:99;
  background:rgba(0,0,0,0.05);
  border:2px solid rgba(0,0,0,0.2);
  box-shadow:0 0 15px rgba(0,0,0,0.1);
  display:flex;align-items:center;justify-content:center;
  font-family:monospace;color:#333;font-size:11px;letter-spacing:2px;
  touch-action:none;
  transition:background 0.15s,box-shadow 0.15s,color 0.15s;
}
#run.active{
  background:rgba(0,0,0,0.7);
  color:#fff;
  box-shadow:0 0 25px rgba(0,0,0,0.3);
}
#loading{
  position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:#f0f4f8;z-index:9999;font-family:monospace;
  color:#333;font-size:14px;letter-spacing:4px;gap:10px;
}
</style>
</head>
<body>
<div id="loading">
  <div>CONNECTING TO PREDICTION NETWORK...</div>
  <div style="font-size:10px;color:#666;letter-spacing:1px;">Spawning player at Y:100</div>
</div>
<canvas id="c"></canvas>
<div id="jst"><div id="jsk"></div></div>
<div id="jmp">JUMP</div>
<div id="run">RUN</div>

<script src="/socket.io/socket.io.js"></script>
<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"}}</script>
<script type="module">
import * as THREE from 'three';

// ── MULTIPLAYER NETWORKING SETUP ──────────────────────────────────────────────
const socket = io();
let myNetworkId = null;
const remotePlayers = {}; 
const targetStates = {}; // Stores server positional goals for interpolation

// ── SHARED STATE ──────────────────────────────────────────────────────────────
let vy = 0;
let running = false;

// ── JOYSTICK ──────────────────────────────────────────────────────────────────
let jx=0,jy=0,jId=-1;
const jstEl=document.getElementById('jst');
const jskEl=document.getElementById('jsk');
const JR=50;

function moveJoy(t){
  const r=jstEl.getBoundingClientRect();
  let dx=t.clientX-(r.left+r.width/2);
  let dy=t.clientY-(r.top+r.height/2);
  const len=Math.sqrt(dx*dx+dy*dy);
  if(len>JR){dx=dx/len*JR;dy=dy/len*JR;}
  jx=dx/JR; jy=dy/JR;
  jskEl.style.transform=`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px))`;
}
jstEl.addEventListener('touchstart',e=>{e.preventDefault();if(jId!==-1)return;jId=e.changedTouches[0].identifier;moveJoy(e.changedTouches[0]);if(running)toggleRun(false);},{passive:false});
jstEl.addEventListener('touchmove',e=>{e.preventDefault();for(const t of e.changedTouches)if(t.identifier===jId){moveJoy(t);break;}},{passive:false});
jstEl.addEventListener('touchend',e=>{for(const t of e.changedTouches)if(t.identifier===jId){jx=0;jy=0;jId=-1;jskEl.style.transform='translate(-50%,-50%)';break;}});
jstEl.addEventListener('touchcancel',e=>{for(const t of e.changedTouches)if(t.identifier===jId){jx=0;jy=0;jId=-1;jskEl.style.transform='translate(-50%,-50%)';break;}});

// ── JUMP BUTTON ───────────────────────────────────────────────────────────────
document.getElementById('jmp').addEventListener('touchstart',e=>{
  e.preventDefault();
  if(vy===0) vy=11;
},{passive:false});

// ── RUN BUTTON ────────────────────────────────────────────────────────────────
const runEl=document.getElementById('run');
function toggleRun(force){
  running = (force !== undefined) ? force : !running;
  runEl.classList.toggle('active', running);
}
runEl.addEventListener('touchstart',e=>{e.preventDefault();toggleRun();},{passive:false});

// ── CAMERA DRAG ───────────────────────────────────────────────────────────────
let camYaw=0,camPitch=0.4,cId=-1,cLx=0,cLy=0;
window.addEventListener('touchstart',e=>{
  for(const t of e.changedTouches){
    if(t.identifier===jId) continue;
    const r=jstEl.getBoundingClientRect();
    if(t.clientX>=r.left&&t.clientX<=r.right&&t.clientY>=r.top&&t.clientY<=r.bottom) continue;
    const jr=document.getElementById('jmp').getBoundingClientRect();
    if(t.clientX>=jr.left&&t.clientX<=jr.right&&t.clientY>=jr.top&&t.clientY<=jr.bottom) continue;
    if(cId===-1){cId=t.identifier;cLx=t.clientX;cLy=t.clientY;}
  }
});
window.addEventListener('touchmove',e=>{
  for(const t of e.changedTouches)
    if(t.identifier===cId){
      camYaw+=(t.clientX-cLx)*0.005; 
      camPitch=Math.max(0.05,Math.min(1.3,camPitch+(t.clientY-cLy)*0.005)); 
      cLx=t.clientX;cLy=t.clientY;
    }
});
window.addEventListener('touchend',e=>{for(const t of e.changedTouches)if(t.identifier===cId)cId=-1;});

let mdown=false,mLx=0,mLy=0;
window.addEventListener('mousedown',e=>{mdown=true;mLx=e.clientX;mLy=e.clientY;});
window.addEventListener('mouseup',()=>mdown=false);
window.addEventListener('mousemove',e=>{
  if(!mdown)return;
  camYaw+=(e.clientX-mLx)*0.005; 
  camPitch=Math.max(0.05,Math.min(1.3,camPitch+(e.clientY-mLy)*0.005)); 
  mLx=e.clientX;mLy=e.clientY;
});

// ── KEYBOARD ──────────────────────────────────────────────────────────────────
const K={};
window.addEventListener('keydown',e=>{
  K[e.code]=true;
  if(e.code==='Space'&&vy===0){e.preventDefault();vy=11;}
  if(e.code==='ShiftLeft'||e.code==='ShiftRight') toggleRun();
  if(running&&(e.code==='KeyW'||e.code==='KeyA'||e.code==='KeyS'||e.code==='KeyD'||
     e.code==='ArrowUp'||e.code==='ArrowDown'||e.code==='ArrowLeft'||e.code==='ArrowRight'))
    toggleRun(false);
});
window.addEventListener('keyup',e=>K[e.code]=false);

// ── MAIN INITIALIZATION ───────────────────────────────────────────────────────
async function main(){
  const R=await import('https://cdn.jsdelivr.net/npm/@dimforge/rapier3d-compat@0.12.0/rapier.es.js');
  await R.init();
  document.getElementById('loading').style.display='none';

  const renderer=new THREE.WebGLRenderer({canvas:document.getElementById('c'),antialias:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.setSize(innerWidth,innerHeight);
  renderer.shadowMap.enabled=true;
  renderer.shadowMap.type=THREE.PCFSoftShadowMap;

  const scene=new THREE.Scene();
  scene.background=new THREE.Color(0xffffff); 
  scene.fog=new THREE.FogExp2(0xffffff,0.001); 
  const camera=new THREE.PerspectiveCamera(65,innerWidth/innerHeight,0.1,500); 

  scene.add(new THREE.AmbientLight(0xffffff,0.9));
  const sun=new THREE.DirectionalLight(0xffffff,0.8);
  sun.position.set(100,200,80);
  sun.castShadow=true;
  sun.shadow.camera.left=-160;sun.shadow.camera.right=160;
  sun.shadow.camera.top=160;sun.shadow.camera.bottom=-160;
  sun.shadow.camera.far=400;
  sun.shadow.mapSize.set(2048,2048);
  scene.add(sun);

  // ── PHYSICS WORLD ────────────────────────────────────────────────────────────
  const world=new R.World({x:0,y:-32,z:0});

  // Environment Setup
  const wallMat=new THREE.MeshStandardMaterial({color:0xd2d7df,roughness:0.6});
  const innerWallMat=new THREE.MeshStandardMaterial({color:0xc0c6cf,roughness:0.5});
  const pillarMat=new THREE.MeshStandardMaterial({color:0xa8afb8,roughness:0.5});
  const detailMat=new THREE.MeshStandardMaterial({color:0xffaa00,metalness:0.1,roughness:0.4});
  const platformMat=new THREE.MeshStandardMaterial({color:0xb2b8c2,roughness:0.7});

  const MAP_SIZE = 360;
  const floorGeo=new THREE.PlaneGeometry(MAP_SIZE,MAP_SIZE);
  const floorMat=new THREE.MeshStandardMaterial({color:0xe2e7ef,roughness:0.4});
  const floorMesh=new THREE.Mesh(floorGeo,floorMat);
  floorMesh.rotation.x=-Math.PI/2;
  floorMesh.receiveShadow=true;
  scene.add(floorMesh);

  const fBody=world.createRigidBody(R.RigidBodyDesc.fixed().setTranslation(0,-0.5,0));
  world.createCollider(R.ColliderDesc.cuboid(MAP_SIZE/2,0.5,MAP_SIZE/2),fBody);

  function addStaticWall(x,y,z,w,h,d,material=wallMat){
    const mesh=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),material);
    mesh.position.set(x,y,z);
    mesh.castShadow=true;mesh.receiveShadow=true;
    scene.add(mesh);
    const rb=world.createRigidBody(R.RigidBodyDesc.fixed().setTranslation(x,y,z));
    world.createCollider(R.ColliderDesc.cuboid(w/2,h/2,d/2),rb);
  }

  // Build Map Architecture
  const H_WALL = 16; const HALF_M = MAP_SIZE/2;
  addStaticWall(0, H_WALL/2, HALF_M, MAP_SIZE, H_WALL, 2);   
  addStaticWall(0, H_WALL/2, -HALF_M, MAP_SIZE, H_WALL, 2);  
  addStaticWall(HALF_M, H_WALL/2, 0, 2, H_WALL, MAP_SIZE);   
  addStaticWall(-HALF_M, H_WALL/2, 0, 2, H_WALL, MAP_SIZE);  
  addStaticWall(-60, 6, 95, 2, 12, 60, innerWallMat);  
  addStaticWall(-60, 6, -95, 2, 12, 60, innerWallMat); 
  addStaticWall(60, 6, 95, 2, 12, 60, innerWallMat);   
  addStaticWall(60, 6, -95, 2, 12, 60, innerWallMat);  
  addStaticWall(-95, 6, -60, 60, 12, 2, innerWallMat); 
  addStaticWall(95, 6, -60, 60, 12, 2, innerWallMat);  
  addStaticWall(-95, 6, 60, 60, 12, 2, innerWallMat);  
  addStaticWall(95, 6, 60, 60, 12, 2, innerWallMat);   
  addStaticWall(0, 11, -60, 24, 2, 4, detailMat);
  addStaticWall(0, 11, 60, 24, 2, 4, detailMat);
  addStaticWall(-60, 11, 0, 4, 2, 24, detailMat);
  addStaticWall(60, 11, 0, 4, 2, 24, detailMat);

  for(let x of [-20, 20]) {
    for(let z of [-20, 20]) {
      addStaticWall(x, 7, z, 4, 14, 4, pillarMat);
      addStaticWall(x, 14.25, z, 5, 0.5, 5, detailMat); 
    }
  }
  addStaticWall(0, 2, 0, 8, 4, 8, platformMat);
  addStaticWall(0, 4.25, 0, 6, 0.5, 6, detailMat);
  addStaticWall(100, 4, 100, 30, 8, 30, wallMat); 
  addStaticWall(100, 9, 100, 15, 2, 15, platformMat); 
  addStaticWall(75, 3, 120, 2, 6, 40);
  addStaticWall(120, 3, 75, 40, 6, 2);
  for(let i=0; i<4; i++) addStaticWall(70 + (i*20), 5, 145, 3, 10, 3, pillarMat);
  addStaticWall(-110, 4, 110, 4, 8, 50);
  addStaticWall(-90, 4, 85, 45, 8, 4);
  addStaticWall(-70, 4, 120, 4, 8, 35);
  addStaticWall(-130, 3, 70, 30, 6, 4);
  addStaticWall(-120, 3, 130, 40, 6, 4);
  addStaticWall(-95, 1, 120, 16, 2, 16, platformMat);
  addStaticWall(-95, 2.25, 120, 12, 0.5, 12, detailMat);
  addStaticWall(110, 8, -110, 8, 16, 8, pillarMat);
  addStaticWall(130, 6, -90, 6, 12, 6, pillarMat);
  addStaticWall(90, 5, -130, 5, 10, 5, pillarMat);
  addStaticWall(85, 7, -85, 10, 14, 10, wallMat);
  addStaticWall(140, 2, -140, 20, 4, 8);
  addStaticWall(100, 2, -140, 8, 4, 20);
  addStaticWall(-100, 5, -100, 40, 10, 4, wallMat);
  addStaticWall(-120, 5, -80, 4, 10, 44, wallMat);
  addStaticWall(-80, 5, -120, 4, 10, 44, wallMat);
  addStaticWall(-100, 2, -100, 12, 4, 12, platformMat);
  addStaticWall(-100, 4.25, -100, 8, 0.5, 8, detailMat);
  addStaticWall(-140, 8, -140, 6, 16, 6, pillarMat);
  addStaticWall(150, 4, 0, 10, 8, 25, innerWallMat);
  addStaticWall(-150, 4, 0, 10, 8, 25, innerWallMat);
  addStaticWall(0, 4, 150, 25, 8, 10, innerWallMat);
  addStaticWall(0, 4, -150, 25, 8, 10, innerWallMat);

  // ── PLAYER SETUP ────────────────────────────────────────────────────────────
  const PH=1.8,PR=0.35;
  const player=new THREE.Group();
  scene.add(player);
  
  const bMesh=new THREE.Mesh(
    new THREE.CapsuleGeometry(PR,PH-PR*2,8,16),
    new THREE.MeshStandardMaterial({color:0xff3366,roughness:0.2}) 
  );
  bMesh.position.y=PH/2;
  bMesh.castShadow=true;
  player.add(bMesh);
  
  const ring=new THREE.Mesh(
    new THREE.TorusGeometry(0.45,0.04,8,32),
    new THREE.MeshStandardMaterial({color:0xff3366})
  );
  ring.rotation.x=Math.PI/2;
  ring.position.y=0.05;
  player.add(ring);

  const visor=new THREE.Mesh(
    new THREE.BoxGeometry(0.3,0.15,0.3),
    new THREE.MeshStandardMaterial({color:0x111111})
  );
  visor.position.set(0,1.4,-0.25);
  player.add(visor);

  // Helper to spawn clones
  function createRemotePlayerMesh() {
    const group = new THREE.Group();
    const body = new THREE.Mesh(
      new THREE.CapsuleGeometry(PR, PH - PR * 2, 8, 16),
      new THREE.MeshStandardMaterial({ color: 0x00aaff, roughness: 0.2 })
    );
    body.position.y = PH / 2;
    body.castShadow = true;
    group.add(body);

    const v = new THREE.Mesh(
      new THREE.BoxGeometry(0.3, 0.15, 0.3),
      new THREE.MeshStandardMaterial({ color: 0x111111 })
    );
    v.position.set(0, 1.4, -0.25);
    group.add(v);
    scene.add(group);
    return group;
  }

  // ── NETWORKING LISTENERS WITH RECONCILIATION BUFFERING ──────────────────────
  socket.on('init', (id) => {
    myNetworkId = id;
    console.log("Connected. Unique ID:", myNetworkId);
  });

  // 🚀 REPLACE WITH THIS LOOSE CLIENT-AUTHORITATIVE LOOKUP:
// 🚀 REPLACE WITH THIS LOOSE CLIENT-AUTHORITATIVE LOOKUP:
socket.on('tick', (serverPlayers) => {
  for (const id in serverPlayers) {
    // Completely bypass parsing your own networking id!
    // This stops the server from overriding your local physics movements.
    if (id === myNetworkId) continue;

    const pData = serverPlayers[id];
    if (!remotePlayers[id]) {
      remotePlayers[id] = createRemotePlayerMesh();
      targetStates[id] = { x: pData.x, y: pData.y, z: pData.z, rotY: pData.rotY };
    }
    
    // Store targeted position parameters received from the backend
    targetStates[id] = { x: pData.x, y: pData.y, z: pData.z, rotY: pData.rotY };
  }
});


  socket.on('removePlayer', (id) => {
    if (remotePlayers[id]) {
      scene.remove(remotePlayers[id]);
      delete remotePlayers[id];
      delete targetStates[id];
    }
  });

  // ── CHARACTER CONTROLLER PHYSICS ─────────────────────────────────────────────
  const controller=world.createCharacterController(0.01);
  controller.setSlideEnabled(true);
  controller.setMaxSlopeClimbAngle(45*Math.PI/180);
  controller.setMinSlopeSlideAngle(30*Math.PI/180);
  controller.enableAutostep(0.3,0.1,true);
  controller.enableSnapToGround(0.3);

  const pBody=world.createRigidBody(R.RigidBodyDesc.kinematicPositionBased().setTranslation(0, 100, 30));
  const pCollider=world.createCollider(R.ColliderDesc.capsule(PH/2-PR, PR), pBody);

  window.addEventListener('resize',()=>{
    renderer.setSize(innerWidth,innerHeight);
    camera.aspect=innerWidth/innerHeight;
    camera.updateProjectionMatrix();
  });

  const MOVE_SPEED = 0.32; 
  const clock=new THREE.Clock();
  const camPos=new THREE.Vector3();
  const lookAt=new THREE.Vector3();
  const rayDir=new THREE.Vector3(); 
  let firstFrame=true;

  // ── MAIN RUNTIME LOOP ────────────────────────────────────────────────────────
  function frame(){
    requestAnimationFrame(frame);
    const elapsed=clock.elapsedTime;
    const dt=Math.min(clock.getDelta(), 0.05); 

    let ix=jx,iy=jy;
    if(K['KeyA']||K['ArrowLeft'])  ix=-1;
    if(K['KeyD']||K['ArrowRight']) ix= 1;
    if(K['KeyW']||K['ArrowUp'])    iy=-1;
    if(K['KeyS']||K['ArrowDown'])  iy= 1;

    const hasInput = Math.abs(ix)>0.02 || Math.abs(iy)>0.02;

    if(running && !hasInput){ iy=-1; }
    if(running && hasInput && (jx!==0||jy!==0)) toggleRun(false);

    const mx= ix*Math.cos(camYaw)+iy*Math.sin(camYaw);
    const mz=-ix*Math.sin(camYaw)+iy*Math.cos(camYaw);

    const speed = MOVE_SPEED * (running ? 1.8 : 1.0);
    
    vy -= 28 * dt; 

    const desiredMove={x:mx*speed, y:vy*dt, z:mz*speed};

    // 🚀 CLIENT-SIDE PREDICTION ACTIVE: 
    // We compute local physics and render inputs instantly without waiting for network replies!
    controller.computeColliderMovement(pCollider, desiredMove);
    const corrected=controller.computedMovement();

    if(corrected.y >= 0 || Math.abs(corrected.y) < Math.abs(desiredMove.y) * 0.01) {
      if(vy < 0) vy = 0;
    }

    const pos=pBody.translation();
    pBody.setNextKinematicTranslation({
      x: pos.x + corrected.x,
      y: pos.y + corrected.y,
      z: pos.z + corrected.z
    });

    world.step();

    const p=pBody.translation();
    player.position.set(p.x, p.y - PH/2, p.z);
    
    if(hasInput || (running && !hasInput)) {
      player.rotation.y = Math.atan2(mx, mz);
    }

    // High frequency position broadcast outbound
    if (socket.connected) {
      socket.emit('move', {
        x: player.position.x,
        y: player.position.y,
        z: player.position.z,
        rotY: player.rotation.y
      });
    }

    // ── INTERPOLATE OPPOSING REMOTE PLAYERS ──────────────────────────────────
    for (const id in remotePlayers) {
      if (targetStates[id]) {
        // Smoothly blend positional matrices by 20% increments each frame step
        remotePlayers[id].position.x += (targetStates[id].x - remotePlayers[id].position.x) * 0.20;
        remotePlayers[id].position.y += (targetStates[id].y - remotePlayers[id].position.y) * 0.20;
        remotePlayers[id].position.z += (targetStates[id].z - remotePlayers[id].position.z) * 0.20;
        remotePlayers[id].rotation.y += (targetStates[id].rotY - remotePlayers[id].rotation.y) * 0.20;
      }
    }

    // Cam focus processing
    lookAt.set(p.x, p.y - PH/2 + 1.2, p.z);
    const idealX = p.x + Math.sin(camYaw) * Math.cos(camPitch) * 7.5;
    const idealY = p.y - PH/2 + 1.2 + Math.sin(camPitch) * 7.5;
    const idealZ = p.z + Math.cos(camYaw) * Math.cos(camPitch) * 7.5;
    
    rayDir.set(idealX - lookAt.x, idealY - lookAt.y, idealZ - lookAt.z);
    const maxDist = rayDir.length();
    rayDir.normalize();
    
    const ray = new R.Ray(lookAt, rayDir);
    const hit = world.castRay(ray, maxDist, true, null, null, pCollider);

    if (hit) {
      const safeDist = Math.max(0.4, hit.toi - 0.15);
      camPos.set(
        lookAt.x + rayDir.x * safeDist,
        lookAt.y + rayDir.y * safeDist,
        lookAt.z + rayDir.z * safeDist
      );
    } else {
      camPos.set(idealX, idealY, idealZ);
    }

    if(firstFrame){ 
      camera.position.copy(camPos); 
      firstFrame=false; 
    } else { 
      camera.position.lerp(camPos, 0.35); 
    }

    camera.lookAt(lookAt);
    ring.rotation.z=elapsed*2;
    renderer.render(scene,camera);
  }
  frame();
}

main().catch(e=>{document.getElementById('loading').textContent='ERROR: '+e.message;console.error(e);});
</script>

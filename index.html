<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>3D Mega Arena - Village Edition</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <div id="loading">
    <div>CONNECTING TO PREDICTION NETWORK...</div>
    <div style="font-size:10px;color:#666;letter-spacing:1px;">Spawning player at Y:100</div>
  </div>

  <canvas id="c"></canvas>
  <div id="jst"><div id="jsk"></div></div>
  <div id="jmp">JUMP</div>
  <div id="run">RUN</div>
  <div id="fir">FIRE</div>

  <div id="leaderboard">
    <div style="border-bottom:1px solid rgba(255,255,255,0.3);padding-bottom:4px;font-weight:bold;">LEADERBOARD</div>
    <div id="scores-list"></div>
  </div>
  
  <div id="crosshair"></div>
    
  <script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('Service Worker registered!', reg))
                .catch(err => console.error('Service Worker registration failed', err));
        });
    }
    window.addEventListener('error', function(e) {
        alert("Crash Log:\nMessage: " + e.message + "\nFile: " + e.filename + "\nLine: " + e.lineno);
    });
    window.addEventListener('unhandledrejection', function(e) {
        alert("Promise Crash:\nReason: " + e.reason);
    });
  </script>

  <script src="/socket.io/socket.io.js"></script>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
      }
    }
  </script>

  <script type="module" src="./main.js"></script>
</body>
</html>
